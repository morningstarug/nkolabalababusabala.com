<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin — NKOLABALA Phone Services</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Rubik:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <a class="brand" href="index.html">
        <img src="logo.svg" class="logo" alt="logo">
        <div class="brand-text"><span class="brand-name">NKOLABALA</span><span class="brand-sub">Phone Services</span></div>
      </a>
      <div style="display:flex;gap:0.6rem;align-items:center">
        <button id="back-btn" class="button">Back</button>
        <button id="admin-logout" class="button button-ghost">Logout</button>
      </div>
    </div>
  </header>

  <main>
    <section class="hero" style="padding:2rem 0 1rem">
      <div class="container">
        <h1 style="margin:0 0 0.4rem">Admin Dashboard</h1>
        <p class="muted">Welcome back — quick overview of daily income and recent entries.</p>
      </div>
    </section>

    <section class="admin-dashboard">
      <div class="container">
        <div class="admin-grid">
          <div class="admin-panel">
            <label for="admin-income-amount">Add income (currency)</label>
            <input id="admin-income-amount" type="number" step="0.01" placeholder="0.00">
            <div class="form-actions" style="margin-top:0.6rem">
              <button id="admin-add-btn" class="button button-primary">Add</button>
              <button id="admin-clear-btn" class="button button-ghost">Clear</button>
            </div>
            <p id="admin-income-status" class="muted"></p>
          </div>

          <div style="display:flex;flex-direction:column;gap:0.6rem">
            <div style="display:flex;gap:0.6rem">
              <div class="stat"><strong id="admin-today">0.00</strong><span>Today</span></div>
              <div class="stat"><strong id="admin-week">0.00</strong><span>7 days</span></div>
              <div class="stat"><strong id="admin-month">0.00</strong><span>30 days</span></div>
            </div>
            <div style="background:var(--card);padding:0.6rem;border-radius:8px;max-height:240px;overflow:auto">
              <h4 style="margin:0 0 0.5rem">Recent entries</h4>
              <ul id="admin-list" class="income-list"></ul>
            </div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner"><p>&copy; 2026 NKOLABALA PHONE SERVICES</p></div>
  </footer>

  <script>
    // Admin page script — checks session and manages entries
    (function(){
      if(!sessionStorage || sessionStorage.getItem('nkol_admin') !== 'logged'){
        // not logged in — go back to home
        window.location.href = 'index.html';
        return;
      }

      const listEl = document.getElementById('admin-list');
      const todayEl = document.getElementById('admin-today');
      const weekEl = document.getElementById('admin-week');
      const monthEl = document.getElementById('admin-month');
      const amountInput = document.getElementById('admin-income-amount');
      const addBtn = document.getElementById('admin-add-btn');
      const clearBtn = document.getElementById('admin-clear-btn');
      const status = document.getElementById('admin-income-status');

      function load(){
        try{ const raw = localStorage.getItem('nkol_income'); return raw? JSON.parse(raw): [] }catch(e){return []}
      }
      function save(arr){ try{ localStorage.setItem('nkol_income', JSON.stringify(arr)) }catch(e){}
      }
      function fmt(v){ return (+v).toFixed(2) }

      function render(){
        const entries = load();
        listEl.innerHTML = '';
        const now = Date.now();
        const day = 24*60*60*1000;
        let t=0,w=0,m=0;
        entries.slice().reverse().forEach(e=>{
          const li = document.createElement('li');
          const d = new Date(e.ts);
          li.textContent = d.toLocaleString();
          const span = document.createElement('span'); span.textContent = fmt(e.amount);
          li.appendChild(span);
          listEl.appendChild(li);
          if(e.ts >= now - day) t += +e.amount;
          if(e.ts >= now - 7*day) w += +e.amount;
          if(e.ts >= now - 30*day) m += +e.amount;
        });
        todayEl.textContent = fmt(t); weekEl.textContent = fmt(w); monthEl.textContent = fmt(m);
      }

      addBtn.addEventListener('click', ()=>{
        const v = parseFloat(amountInput.value || 0);
        if(!v || v <= 0){ status.textContent = 'Enter a positive amount.'; return }
        const arr = load(); arr.push({ts: Date.now(), amount: v}); save(arr); amountInput.value=''; status.textContent='Saved.'; render(); setTimeout(()=>status.textContent='',1200);
      });
      clearBtn.addEventListener('click', ()=>{ if(!confirm('Clear all entries?')) return; save([]); render(); });

      document.getElementById('admin-logout').addEventListener('click', ()=>{ try{ sessionStorage.removeItem('nkol_admin') }catch(e){}; window.location.href='index.html' });
      document.getElementById('back-btn').addEventListener('click', ()=>{ window.location.href='index.html' });

      render();
    })();
  </script>
</body>
</html>
